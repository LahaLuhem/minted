name: minted
description: >-
  Well-modelled Dart value types (email, IBAN, and more) built on
  parse-don't-validate, so every instance is guaranteed well-formed. Pure Dart.
version: 0.0.0
homepage: https://github.com/LahaLuhem/minted?tab=readme-ov-file
repository: https://github.com/LahaLuhem/minted

topics:
  - validation
  - type-safety
  - identifiers
  - domain-driven-design
  - standards

environment:
  sdk: ^3.12.0

dependencies:
  collection: ^1.19.1
  email_validator: ^3.0.0
  iban_validator: ^1.0.2
  meta: ^1.18.0
  phone_numbers_parser: ^9.0.24

dev_dependencies:
  analyzer: ^14.0.0
  checks: ^0.3.1
  test: ^1.31.2
